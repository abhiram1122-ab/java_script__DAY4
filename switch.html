<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var grade=window.prompt("Enter the grade here:")
        switch(grade)
        {
            case 'A':
                document.write("you passed in first_class")
                document.write("<hr>")
                break
            case 'B':
                document.write("you passed in second_class")
                document.write("<hr>")
                break
            case 'C':
                document.write("you passed an average")
                break
            default:
                document.write("Enter the proper grade system")

        }
    </script>
</body>
</html>
